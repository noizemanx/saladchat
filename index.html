<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SaladChat PRO MAX</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }

/* botones grandes */
.iconBtn {
  font-size:26px;
  margin:8px;
  cursor:pointer;
}

/* usuarios */
#usuarios {
  position:fixed;
  right:0;
  top:0;
  width:220px;
  height:100%;
  background:#111;
  overflow:auto;
}

/* video */
.videoBox {
  position:absolute;
  width:260px;
  border:2px solid #333;
  border-radius:10px;
  background:#000;
  touch-action:none;
}

.videoHeader {
  background:#111;
  padding:5px;
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

.videoHeader span {
  font-size:22px;
  margin-left:8px;
}

/* chat */
#chatGlobal {
  position:fixed;
  bottom:0;
  left:0;
  width:400px;
  height:300px;
  background:#111;
  display:flex;
  flex-direction:column;
}

#mensajes { flex:1; overflow:auto; }
</style>
</head>

<body>

<div>
  <span class="iconBtn" onclick="activarCam()">🎥</span>
</div>

<div id="usuarios"></div>

<div id="chatGlobal">
  <div id="mensajes"></div>
  <input id="msg">
  <button onclick="enviar()">Enviar</button>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<script>

let socket = io("https://saladchat.onrender.com");

let nombre = prompt("Tu nombre") || "Anon";
socket.emit("join-room", nombre);

let localStream = null;
let peers = {};
let currentCam = "user";

/* 🎥 ACTIVAR CAM */
async function activarCam(){
  if(localStream) return;

  let publica = confirm("¿Cámara pública?");
  
  localStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentCam},
    audio:true
  });

  crearVentanaVideo(localStream, "YO", true);

  socket.emit("toggle-cam", publica);
}

/* 🔄 CAMBIO CAMARA */
async function cambiarCam(){
  currentCam = currentCam === "user" ? "environment" : "user";

  let stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentCam},
    audio:true
  });

  localStream = stream;
}

/* 🎥 VENTANA VIDEO */
function crearVentanaVideo(stream,nombre,local=false){

  let box = document.createElement("div");
  box.className="videoBox";
  box.style.top="100px";
  box.style.left="100px";

  let header = document.createElement("div");
  header.className="videoHeader";

  let title = document.createElement("span");
  title.innerText = nombre;

  let controls = document.createElement("span");

  let micBtn = document.createElement("span");
  micBtn.innerText="🎤";

  let flipBtn = document.createElement("span");
  flipBtn.innerText="🔄";

  let closeBtn = document.createElement("span");
  closeBtn.innerText="❌";

  controls.appendChild(micBtn);
  controls.appendChild(flipBtn);
  controls.appendChild(closeBtn);

  header.appendChild(title);
  header.appendChild(controls);

  let video = document.createElement("video");
  video.autoplay=true;
  video.srcObject=stream;

  box.appendChild(header);
  box.appendChild(video);
  document.body.appendChild(box);

  /* 🎤 MUTE */
  micBtn.onclick=()=>{
    stream.getAudioTracks().forEach(t=>{
      t.enabled = !t.enabled;
      micBtn.innerText = t.enabled ? "🎤" : "🔇";
    });
  };

  /* 🔄 CAM */
  flipBtn.onclick=()=>{
    if(local) cambiarCam();
  };

  /* ❌ CLOSE */
  closeBtn.onclick=()=>{
    box.remove();
    if(local){
      socket.emit("cam-off");
      localStream.getTracks().forEach(t=>t.stop());
      localStream=null;
    }
  };

  /* 🖱️ DRAG + TOUCH */
  let move = (x,y)=>{
    box.style.left = x + "px";
    box.style.top = y + "px";
  };

  header.onmousedown = e=>{
    let shiftX = e.clientX - box.offsetLeft;
    let shiftY = e.clientY - box.offsetTop;

    document.onmousemove = e=>{
      move(e.clientX-shiftX,e.clientY-shiftY);
    };

    document.onmouseup = ()=>document.onmousemove=null;
  };

  header.ontouchstart = e=>{
    let touch = e.touches[0];
    let shiftX = touch.clientX - box.offsetLeft;
    let shiftY = touch.clientY - box.offsetTop;

    document.ontouchmove = e=>{
      let t = e.touches[0];
      move(t.clientX-shiftX,t.clientY-shiftY);
    };

    document.ontouchend = ()=>document.ontouchmove=null;
  };
}

/* 👥 USUARIOS */
socket.on("lista-usuarios", users=>{
  usuarios.innerHTML="";

  for(let id in users){
    if(id===socket.id) continue;

    let u = users[id];

    let estado = "⚫";
    if(u.camActiva){
      estado = u.camPublica ? "🟢" : "🔴";
    }

    let div = document.createElement("div");
    div.innerText = estado + " " + u.nombre;

    div.onclick=()=>{
      if(u.camPublica){
        crearPeer(id,true);
      }else{
        socket.emit("solicitar-cam",id);
      }
    };

    // CLICK DERECHO + TOUCH HOLD
    let timeout;
    div.onmousedown=()=>{
      timeout=setTimeout(()=>abrirPrivado(id,u.nombre),600);
    };
    div.onmouseup=()=>clearTimeout(timeout);
    div.onmouseleave=()=>clearTimeout(timeout);

    div.oncontextmenu=e=>{
      e.preventDefault();
      abrirPrivado(id,u.nombre);
    };

    usuarios.appendChild(div);
  }
});

/* 💬 CHAT PRIVADO */
function abrirPrivado(id,nombre){
  let texto = prompt("Mensaje privado a "+nombre);
  if(texto){
    socket.emit("mensaje-privado",{to:id,texto});
  }
}

socket.on("mensaje-privado",d=>{
  alert(`💬 ${d.nombre}: ${d.texto}`);
});

/* 💬 GLOBAL */
function enviar(){
  socket.emit("mensaje",{nombre,texto:msg.value});
}

socket.on("mensaje",d=>{
  mensajes.innerHTML += `<p>${d.nombre}: ${d.texto}</p>`;
});

/* 🔥 WEBRTC */
function crearPeer(id, initiator){
  let peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  if(localStream){
    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));
  }

  peer.ontrack = e=>{
    crearVentanaVideo(e.streams[0],id);
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  if(initiator){
    peer.createOffer().then(o=>{
      peer.setLocalDescription(o);
      socket.emit("signal",{to:id,signal:o});
    });
  }

  peers[id]=peer;
}

socket.on("signal", async data=>{
  if(!peers[data.from]){
    crearPeer(data.from,false);
  }

  let peer = peers[data.from];

  if(data.signal.type){
    await peer.setRemoteDescription(new RTCSessionDescription(data.signal));

    if(data.signal.type==="offer"){
      let ans = await peer.createAnswer();
      await peer.setLocalDescription(ans);
      socket.emit("signal",{to:data.from,signal:ans});
    }
  } else {
    await peer.addIceCandidate(new RTCIceCandidate(data.signal));
  }
});

</script>

</body>
</html>
