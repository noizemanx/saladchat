<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SaladChat PRO UI</title>

<style>
body {
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Segoe UI;
}

/* 🔝 TOPBAR */
#topbar {
  position:fixed;
  top:10px;
  left:10px;
  z-index:100;
}

.iconBtn {
  font-size:20px;
  margin:5px;
  cursor:pointer;
}

/* 👥 USUARIOS */
#usuarios {
  position:fixed;
  right:0;
  top:0;
  width:220px;
  height:100%;
  background:#111;
  padding:10px;
  overflow:auto;
}

/* 💬 CHAT */
#chatGlobal {
  position:fixed;
  bottom:0;
  left:0;
  width:400px;
  height:300px;
  background:#111;
  display:flex;
  flex-direction:column;
}

#mensajes {
  flex:1;
  overflow:auto;
  padding:10px;
}

#inputArea {
  display:flex;
}

#msg {
  flex:1;
}

/* 🎥 VIDEO BOX */
.videoBox {
  position:absolute;
  width:250px;
  resize:both;
  overflow:hidden;
  border:2px solid #333;
  border-radius:10px;
  background:#000;
}

.videoHeader {
  background:#111;
  padding:3px;
  cursor:move;
  display:flex;
  justify-content:space-between;
}

video {
  width:100%;
}

/* 💬 CHAT PRIVADO */
.privateChat {
  position:absolute;
  width:250px;
  height:200px;
  background:#111;
  border:1px solid #333;
}
</style>
</head>

<body>

<div id="topbar">
  <span class="iconBtn" onclick="activarCam()">🎥</span>
</div>

<div id="usuarios"></div>

<div id="chatGlobal">
  <div id="mensajes"></div>
  <div id="inputArea">
    <input id="msg">
    <button onclick="emoji('😀')">😀</button>
    <button onclick="emoji('🔥')">🔥</button>
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<script>

let socket = io("https://saladchat.onrender.com");

let nombre = prompt("Tu nombre") || "Anon";
socket.emit("join-room", nombre);

let localStream = null;
let peers = {};
let camPublica = false;

/* 🎥 ACTIVAR CAM */
async function activarCam(){
  if(localStream) return;

  camPublica = confirm("¿Quieres cámara pública?");

  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  crearVentanaVideo(localStream, "YO", true);

  socket.emit("toggle-cam", camPublica);
}

/* 🔄 CAMBIAR CAMARA (MOBILE) */
async function cambiarCam(){
  let devices = await navigator.mediaDevices.enumerateDevices();
  let cams = devices.filter(d=>d.kind==="videoinput");

  if(cams.length<2) return;

  let nueva = cams[1].deviceId;

  let stream = await navigator.mediaDevices.getUserMedia({
    video:{deviceId:nueva},
    audio:true
  });

  localStream = stream;
}

/* 🎥 CREAR VENTANA */
function crearVentanaVideo(stream,nombre,local=false){

  let box = document.createElement("div");
  box.className="videoBox";
  box.style.top="100px";
  box.style.left="100px";

  let header = document.createElement("div");
  header.className="videoHeader";
  header.innerHTML = `
    ${nombre}
    <span>
      🎤
      🔄
      ❌
    </span>
  `;

  let video = document.createElement("video");
  video.autoplay=true;
  video.srcObject=stream;

  box.appendChild(header);
  box.appendChild(video);
  document.body.appendChild(box);

  // DRAG
  header.onmousedown = e=>{
    let shiftX = e.clientX - box.offsetLeft;
    let shiftY = e.clientY - box.offsetTop;

    document.onmousemove = e=>{
      box.style.left = e.clientX - shiftX + "px";
      box.style.top = e.clientY - shiftY + "px";
    };

    document.onmouseup = ()=>document.onmousemove=null;
  };

  // BOTONES
  let icons = header.querySelectorAll("span span, span");
}

/* 👥 USUARIOS */
socket.on("lista-usuarios", users=>{
  usuarios.innerHTML="";

  for(let id in users){
    if(id===socket.id) continue;

    let div = document.createElement("div");
    div.innerText = (users[id].camPublica?"🟢":"🔴")+" "+users[id].nombre;

    div.onclick=()=>{
      if(users[id].camPublica){
        crearPeer(id,true);
      }else{
        socket.emit("solicitar-cam",id);
      }
    };

    div.oncontextmenu=e=>{
      e.preventDefault();
      abrirChatPrivado(id,users[id].nombre);
    };

    usuarios.appendChild(div);
  }
});

/* 💬 CHAT GLOBAL */
function enviar(){
  let texto = msg.value;
  socket.emit("mensaje",{nombre,texto});
}

socket.on("mensaje",d=>{
  mensajes.innerHTML += `<p style="color:#38bdf8">${d.nombre}: ${d.texto}</p>`;
});

/* 😀 EMOJI */
function emoji(e){
  msg.value += e;
}

/* 💬 CHAT PRIVADO */
function abrirChatPrivado(id,nombre){
  let box = document.createElement("div");
  box.className="privateChat";

  box.innerHTML = `
    <b>${nombre}</b>
    <div class="msgs"></div>
    <input class="inp">
  `;

  document.body.appendChild(box);

  box.querySelector(".inp").onkeypress=e=>{
    if(e.key==="Enter"){
      socket.emit("mensaje-privado",{to:id,texto:e.target.value});
    }
  };
}

socket.on("mensaje-privado",d=>{
  alert(`💬 ${d.nombre}: ${d.texto}`);
});

/* 🔥 WEBRTC */
function crearPeer(id, initiator){
  let peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  if(localStream){
    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));
  }

  peer.ontrack = e=>{
    crearVentanaVideo(e.streams[0],id);
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  if(initiator){
    peer.createOffer().then(o=>{
      peer.setLocalDescription(o);
      socket.emit("signal",{to:id,signal:o});
    });
  }

  peers[id]=peer;
}

socket.on("signal", async data=>{
  if(!peers[data.from]){
    crearPeer(data.from,false);
  }

  let peer = peers[data.from];

  if(data.signal.type){
    await peer.setRemoteDescription(new RTCSessionDescription(data.signal));

    if(data.signal.type==="offer"){
      let ans = await peer.createAnswer();
      await peer.setLocalDescription(ans);
      socket.emit("signal",{to:data.from,signal:ans});
    }
  } else {
    await peer.addIceCandidate(new RTCIceCandidate(data.signal));
  }
});

</script>

</body>
</html>
