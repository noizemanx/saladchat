<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SaladChat PRO FIX</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

/* 🔥 BOTONES GRANDES */
.iconBtn {
  font-size:32px;
  padding:10px;
}

/* 👥 USUARIOS */
#usuarios {
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  overflow:auto;
}

.user {
  padding:12px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user button {
  font-size:20px;
  padding:6px;
}

/* 🎥 VIDEO */
.videoBox {
  position:absolute;
  width:280px;
  background:#000;
  border:2px solid #333;
  border-radius:10px;
}

.videoHeader {
  display:flex;
  justify-content:space-between;
  background:#111;
  padding:8px;
}

.videoHeader span {
  font-size:26px;
  margin-left:10px;
}

/* 💬 CHAT */
#chatGlobal {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:35%;
  background:#111;
  display:flex;
  flex-direction:column;
}

#mensajes {
  flex:1;
  overflow:auto;
}
</style>
</head>

<body>

<div>
  <span class="iconBtn" onclick="activarCam()">🎥</span>
</div>

<div id="usuarios"></div>

<div id="chatGlobal">
  <div id="mensajes"></div>
  <input id="msg">
  <button onclick="enviar()">Enviar</button>
</div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<script>

let socket = io("https://saladchat.onrender.com");

let nombre = prompt("Tu nombre") || "Anon";
socket.emit("join-room", nombre);

let localStream = null;
let peers = {};
let currentCam = "user";

/* 🎥 ACTIVAR CAM */
async function activarCam(){
  if(localStream) return;

  let publica = confirm("¿Cámara pública?");

  localStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentCam},
    audio:true
  });

  crearVentanaVideo(localStream,"YO",true);

  socket.emit("toggle-cam", publica);
}

/* 🔄 CAMBIO REAL DE CAMARA */
async function cambiarCam(){

  currentCam = currentCam === "user" ? "environment" : "user";

  let newStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentCam},
    audio:true
  });

  let videoTrack = newStream.getVideoTracks()[0];

  // reemplazar en peers
  for(let id in peers){
    let sender = peers[id].getSenders().find(s=>s.track.kind==="video");
    if(sender){
      sender.replaceTrack(videoTrack);
    }
  }

  localStream.getTracks().forEach(t=>t.stop());
  localStream = newStream;
}

/* 🎥 VENTANA */
function crearVentanaVideo(stream,nombre,local=false){

  let box = document.createElement("div");
  box.className="videoBox";
  box.style.top="80px";
  box.style.left="20px";

  let header = document.createElement("div");
  header.className="videoHeader";

  let title = document.createElement("span");
  title.innerText = nombre;

  let controls = document.createElement("div");

  let mic = document.createElement("span");
  mic.innerText="🎤";

  let flip = document.createElement("span");
  flip.innerText="🔄";

  let close = document.createElement("span");
  close.innerText="❌";

  controls.appendChild(mic);
  controls.appendChild(flip);
  controls.appendChild(close);

  header.appendChild(title);
  header.appendChild(controls);

  let video = document.createElement("video");
  video.autoplay=true;
  video.playsInline=true;
  video.srcObject=stream;

  box.appendChild(header);
  box.appendChild(video);
  document.body.appendChild(box);

  /* 🎤 MUTE */
  mic.onclick=()=>{
    stream.getAudioTracks().forEach(t=>{
      t.enabled=!t.enabled;
      mic.innerText = t.enabled ? "🎤" : "🔇";
    });
  };

  /* 🔄 CAM */
  flip.onclick=()=>{
    if(local) cambiarCam();
  };

  /* ❌ */
  close.onclick=()=>{
    box.remove();
    if(local){
      socket.emit("cam-off");
      localStream.getTracks().forEach(t=>t.stop());
      localStream=null;
    }
  };

  /* 📱 DRAG SIMPLE */
  let startX,startY;

  header.ontouchstart = e=>{
    let t = e.touches[0];
    startX = t.clientX - box.offsetLeft;
    startY = t.clientY - box.offsetTop;
  };

  header.ontouchmove = e=>{
    let t = e.touches[0];
    box.style.left = (t.clientX - startX)+"px";
    box.style.top = (t.clientY - startY)+"px";
  };
}

/* 👥 USUARIOS */
socket.on("lista-usuarios", users=>{
  usuarios.innerHTML="";

  for(let id in users){
    if(id===socket.id) continue;

    let u = users[id];

    let estado = "⚫";
    if(u.camActiva){
      estado = u.camPublica ? "🟢" : "🔴";
    }

    let div = document.createElement("div");
    div.className="user";

    let name = document.createElement("span");
    name.innerText = estado+" "+u.nombre;

    let btnChat = document.createElement("button");
    btnChat.innerText="💬";

    // VIDEO CLICK
    name.onclick=()=>{
      if(u.camPublica){
        crearPeer(id,true);
      }else{
        socket.emit("solicitar-cam",id);
      }
    };

    // CHAT PRIVADO
    btnChat.onclick=()=>{
      let txt = prompt("Mensaje:");
      if(txt){
        socket.emit("mensaje-privado",{to:id,texto:txt});
      }
    };

    div.appendChild(name);
    div.appendChild(btnChat);
    usuarios.appendChild(div);
  }
});

/* 💬 GLOBAL */
function enviar(){
  socket.emit("mensaje",{nombre,texto:msg.value});
}

socket.on("mensaje",d=>{
  mensajes.innerHTML += `<p>${d.nombre}: ${d.texto}</p>`;
});

/* 💬 PRIVADO */
socket.on("mensaje-privado",d=>{
  alert(`💬 ${d.nombre}: ${d.texto}`);
});

/* 🔥 WEBRTC */
function crearPeer(id, initiator){
  let peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  if(localStream){
    localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));
  }

  peer.ontrack = e=>{
    crearVentanaVideo(e.streams[0],id);
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  if(initiator){
    peer.createOffer().then(o=>{
      peer.setLocalDescription(o);
      socket.emit("signal",{to:id,signal:o});
    });
  }

  peers[id]=peer;
}

socket.on("signal", async data=>{
  if(!peers[data.from]){
    crearPeer(data.from,false);
  }

  let peer = peers[data.from];

  if(data.signal.type){
    await peer.setRemoteDescription(new RTCSessionDescription(data.signal));

    if(data.signal.type==="offer"){
      let ans = await peer.createAnswer();
      await peer.setLocalDescription(ans);
      socket.emit("signal",{to:data.from,signal:ans});
    }
  } else {
    await peer.addIceCandidate(new RTCIceCandidate(data.signal));
  }
});

</script>

</body>
</html>
