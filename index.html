<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SaladChat PRO+</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }

#videos {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:5px;
  padding:5px;
}

video { width:100%; border-radius:10px; }

#usuarios {
  position:fixed;
  right:0;
  top:0;
  width:220px;
  height:100%;
  background:#111;
  overflow:auto;
  padding:10px;
}

.user {
  padding:6px;
  cursor:pointer;
  border-bottom:1px solid #333;
}

.user:hover { background:#222; }

.publica { color:#22c55e; }
.privada { color:#ef4444; }

#controls {
  position:fixed;
  top:10px;
  left:10px;
}
</style>
</head>

<body>

<div id="controls">
  <button onclick="toggleModo()">Modo: Privada</button>
</div>

<div id="videos">
  <video id="localVideo" autoplay muted></video>
</div>

<div id="usuarios"></div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

<script>

let socket = io("https://saladchat.onrender.com");

let nombre = prompt("Tu nombre") || "Anon";
socket.emit("join-room", nombre);

let localStream;
let peers = {};
let camPublica = false;

navigator.mediaDevices.getUserMedia({video:true,audio:true})
.then(stream=>{
  localStream = stream;
  document.getElementById("localVideo").srcObject = stream;
});

// 🔥 CAMBIAR MODO
function toggleModo(){
  camPublica = !camPublica;

  socket.emit("toggle-cam", camPublica);

  document.querySelector("#controls button").innerText =
    camPublica ? "Modo: Pública" : "Modo: Privada";
}

// 🔥 LISTA USUARIOS
socket.on("lista-usuarios", (users)=>{
  let cont = document.getElementById("usuarios");
  cont.innerHTML = "";

  for(let id in users){
    if(id === socket.id) continue;

    let div = document.createElement("div");
    div.className = "user";

    let estado = users[id].camPublica ? "🟢" : "🔴";

    div.innerHTML = `${estado} ${users[id].nombre}`;

    div.onclick = ()=>{
      if(users[id].camPublica){
        crearPeer(id,true);
      } else {
        socket.emit("solicitar-cam", id);
      }
    };

    cont.appendChild(div);
  }
});

// 🔥 SOLICITUD
socket.on("solicitud-cam", (data)=>{
  let ok = confirm(`${data.nombre} quiere ver tu cámara`);
  socket.emit("respuesta-cam", {
    to: data.from,
    aceptado: ok
  });
});

// 🔥 RESPUESTA
socket.on("respuesta-cam", (data)=>{
  if(data.aceptado){
    crearPeer(data.from,true);
  } else {
    alert("Solicitud rechazada");
  }
});

// 🔥 WEBRTC
function crearPeer(id, initiator){
  let peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  peer.ontrack = e=>{
    let v = document.createElement("video");
    v.autoplay = true;
    v.srcObject = e.streams[0];
    document.getElementById("videos").appendChild(v);
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("signal",{to:id,signal:e.candidate});
    }
  };

  if(initiator){
    peer.createOffer().then(o=>{
      peer.setLocalDescription(o);
      socket.emit("signal",{to:id,signal:o});
    });
  }

  peers[id] = peer;
}

socket.on("signal", async data=>{
  if(!peers[data.from]){
    crearPeer(data.from,false);
  }

  let peer = peers[data.from];

  if(data.signal.type){
    await peer.setRemoteDescription(new RTCSessionDescription(data.signal));

    if(data.signal.type==="offer"){
      let ans = await peer.createAnswer();
      await peer.setLocalDescription(ans);
      socket.emit("signal",{to:data.from,signal:ans});
    }
  } else {
    await peer.addIceCandidate(new RTCIceCandidate(data.signal));
  }
});

</script>

</body>
</html>
